name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: localhost:29092
      KAFKA_TOPIC_INVENTORY_UPDATES: inventory_updates
      RUN_E2E_INTEGRATION_TESTS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start integration dependencies
        run: docker compose up -d --wait postgres redis zookeeper kafka

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Black
        run: black --check .

      - name: Check import sorting with isort
        run: isort --check-only .

      - name: Run tests
        run: pytest -q

      - name: Stop integration dependencies
        if: always()
        run: docker compose down -v
